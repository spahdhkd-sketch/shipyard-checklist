        <div id="mobileSyncBadge" class="sync-chip"><span class="sync-dot"></span><span id="mobileSyncText">로컬 저장</span></div>
      </div>
    </header>

    <main class="main">
      <div id="page"></div>
    </main>

    <nav id="mobileNav" class="bottom-nav"></nav>
  </div>
  <div id="toast" class="toast"></div>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.105.3" defer></script>
