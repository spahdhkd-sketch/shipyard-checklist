<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>조선소 안전 체크리스트</title>
  <style>
    :root {
      --ink: #172033;
      --muted: #607084;
      --soft: #8795a8;
      --line: #d8e0ea;
      --line-strong: #b9c5d4;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --page: #eef3f7;
      --blue: #1f6eb3;
      --cyan: #168a94;
      --green: #2e7d4f;
      --red: #b8323b;
      --amber: #a86616;
      --shadow: 0 16px 38px rgba(23, 32, 51, .08);
      --radius: 8px;
      --nav-width: 236px;
    }

    * { box-sizing: border-box; }
    html { min-height: 100%; }
    body {
      margin: 0;
      min-height: 100%;
      background: var(--page);
      color: var(--ink);
      font-family: Arial, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    button, input, select, textarea { font: inherit; }
    button { -webkit-tap-highlight-color: transparent; }
    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: var(--nav-width) minmax(0, 1fr);
    }

    .sidebar {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 22px 18px;
      background: #111a2d;
      color: #fff;
      border-right: 1px solid rgba(255,255,255,.08);
      display: flex;
      flex-direction: column;
    }

    .brand {
      padding: 10px 8px 18px;
      border-bottom: 1px solid rgba(255,255,255,.12);
      margin-bottom: 18px;
    }

    .brand-title {
      font-size: 21px;
      font-weight: 800;
      line-height: 1.25;
    }

    .brand-sub {
      color: rgba(255,255,255,.66);
      font-size: 12px;
      margin-top: 7px;
      line-height: 1.45;
    }

    .sync-badge {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      margin-top: 13px;
      padding: 6px 9px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(255,255,255,.08);
      color: rgba(255,255,255,.88);
    }

    .sync-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--soft);
    }

    .sync-badge.online .sync-dot { background: #4ade80; }
    .sync-badge.pending .sync-dot { background: #fbbf24; }
    .sync-badge.error .sync-dot { background: #fb7185; }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .view-switch {
      margin-top: auto;
      padding: 14px 8px 4px;
      border-top: 1px solid rgba(255,255,255,.12);
    }

    .view-switch-label {
      font-size: 12px;
      font-weight: 800;
      color: rgba(255,255,255,.68);
      margin-bottom: 8px;
    }

    .view-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4px;
      padding: 4px;
      border-radius: var(--radius);
      background: rgba(255,255,255,.08);
      border: 1px solid rgba(255,255,255,.12);
    }

    .view-toggle button {
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: rgba(255,255,255,.68);
      padding: 8px 6px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
    }

    .view-toggle button.active {
      background: #fff;
      color: #111a2d;
      box-shadow: 0 2px 8px rgba(0,0,0,.16);
    }

    .desktop-preview-toggle,
    .mobile-screen-toggle {
      display: none;
    }

    .desktop-preview-toggle {
      position: fixed;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 60;
      padding: 8px;
      border-radius: 12px;
      background: rgba(17, 26, 45, .94);
      border: 1px solid rgba(255,255,255,.14);
      box-shadow: 0 14px 34px rgba(23, 32, 51, .2);
    }

    .mode-toggle {
      display: grid;
      gap: 5px;
    }

    .mode-toggle button {
      border: 0;
      border-radius: 8px;
      background: transparent;
      color: rgba(255,255,255,.7);
      padding: 8px 10px;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      white-space: nowrap;
    }

    .mode-toggle button.active {
      background: #fff;
      color: #111a2d;
      box-shadow: 0 4px 12px rgba(0,0,0,.18);
    }

    .mobile-screen-toggle {
      justify-self: end;
      align-self: center;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      padding: 3px;
      border-radius: 999px;
      background: rgba(255,255,255,.12);
      border: 1px solid rgba(255,255,255,.18);
    }

    .mobile-screen-toggle button {
      border: 0;
      border-radius: 999px;
      background: transparent;
      color: rgba(255,255,255,.72);
      padding: 6px 8px;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
    }

    .mobile-screen-toggle button.active {
      background: #fff;
      color: #002b66;
    }

    .nav-btn {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      background: transparent;
      color: rgba(255,255,255,.72);
      text-align: left;
      cursor: pointer;
    }

    .nav-btn:hover { background: rgba(255,255,255,.08); color: #fff; }
    .nav-btn.active {
      color: #fff;
      background: rgba(31, 110, 179, .34);
      border-color: rgba(255,255,255,.14);
    }

    .nav-icon {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 7px;
      background: rgba(255,255,255,.1);
      font-weight: 800;
      font-size: 13px;
      flex: 0 0 auto;
    }

    .nav-icon svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .main {
      min-width: 0;
      padding: 26px clamp(18px, 4vw, 42px) 40px;
    }

    .mobile-header,
    .bottom-nav { display: none; }

    body.preview-mobile {
      background: #dce5ef;
    }

    body.preview-mobile .app {
      display: block;
      width: min(430px, 100%);
      min-height: 100vh;
      margin: 0 auto;
      background: var(--page);
      box-shadow: 0 0 0 1px rgba(23, 32, 51, .08), 0 28px 70px rgba(23, 32, 51, .18);
    }

    body.preview-mobile .sidebar,
    body.preview-mobile .view-switch { display: none; }
    body.preview-mobile .mobile-header { display: block; }
    body.preview-mobile .main { padding: 16px 12px 92px; }
    body.preview-mobile .bottom-nav { display: grid; }
    body.preview-mobile .page-head { flex-direction: column; gap: 12px; }
    body.preview-mobile .toolbar { justify-content: flex-start; width: 100%; }
    body.preview-mobile .grid-3,
    body.preview-mobile .grid-2,
    body.preview-mobile .split,
    body.preview-mobile .process-chart,
    body.preview-mobile .form-row,
    body.preview-mobile .inline-form { grid-template-columns: 1fr; }
    body.preview-mobile .stat-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    body.preview-mobile .work-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    body.preview-mobile .quick-actions { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    body.preview-mobile .history-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    body.preview-mobile .mini-process { grid-template-columns: repeat(5, minmax(54px, 1fr)); overflow-x: auto; }
    body.preview-mobile .process-lanes { grid-template-columns: repeat(5, minmax(62px, 1fr)); }
    body.preview-mobile .band { margin: 14px -12px; padding: 14px 12px; }
    body.preview-mobile .item-row { flex-direction: column; }
    body.preview-mobile .item-actions { width: 100%; justify-content: flex-start; }
    body.preview-mobile .ship-card { grid-template-columns: 1fr; }
    body.preview-mobile .ship-date-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    body.preview-mobile .table,
    body.preview-mobile .table tbody,
    body.preview-mobile .table tr,
    body.preview-mobile .table td {
      display: block;
      width: 100%;
    }
    body.preview-mobile .table thead { display: none; }
    body.preview-mobile .table tr {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      margin-bottom: 10px;
      overflow: hidden;
    }
    body.preview-mobile .table td {
      border-bottom: 1px solid var(--line);
      padding: 10px 12px;
    }
    body.preview-mobile .table td:last-child { border-bottom: 0; }
    body.preview-mobile .table td::before {
      content: attr(data-label);
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .page-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 18px;
    }

    .eyebrow {
      font-size: 12px;
      font-weight: 800;
      color: var(--cyan);
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h1 {
      margin: 0;
      font-size: clamp(26px, 3vw, 36px);
      line-height: 1.18;
      letter-spacing: 0;
    }

    .lead {
      color: var(--muted);
      margin: 8px 0 0;
      font-size: 14px;
      line-height: 1.55;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-pad { padding: 18px; }
    .band {
      background: var(--surface);
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      margin: 18px calc(clamp(18px, 4vw, 42px) * -1);
      padding: 18px clamp(18px, 4vw, 42px);
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .split {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 330px;
      gap: 14px;
      align-items: start;
    }

    .metric {
      min-height: 108px;
      padding: 16px;
      border-radius: var(--radius);
      background: var(--surface);
      border: 1px solid var(--line);
    }

    .metric-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 12px;
    }

    .metric-value {
      font-size: 32px;
      font-weight: 800;
      line-height: 1;
    }

    .home-hero {
      position: relative;
      overflow: hidden;
      padding: 20px;
      margin-bottom: 14px;
      border-radius: var(--radius);
      color: #fff;
      background: linear-gradient(135deg, #111a2d 0%, #1f6eb3 58%, #168a94 100%);
      box-shadow: var(--shadow);
    }

    .home-hero::after {
      content: "";
      position: absolute;
      right: -34px;
      top: -38px;
      width: 140px;
      height: 140px;
      border-radius: 50%;
      border: 28px solid rgba(255,255,255,.1);
    }

    .home-hero-meta {
      position: relative;
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 18px;
      color: rgba(255,255,255,.78);
      font-size: 12px;
      font-weight: 800;
    }

    .home-hero h1 {
      position: relative;
      max-width: 360px;
      color: #fff;
      font-size: clamp(27px, 5vw, 38px);
    }

    .home-hero p {
      position: relative;
      margin: 8px 0 0;
      color: rgba(255,255,255,.78);
      line-height: 1.5;
      font-size: 14px;
    }

    .quick-actions {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 14px;
    }

    .quick-card {
      min-height: 118px;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(23, 32, 51, .07);
    }

    .quick-card.primary {
      background: #eef6ff;
      border-color: #bdd7f2;
    }

    .quick-icon {
      width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 14px;
      border-radius: 10px;
      background: var(--surface-soft);
      color: var(--blue);
    }

    .quick-icon svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .quick-title {
      font-size: 17px;
      font-weight: 800;
      margin-bottom: 5px;
    }

    .stat-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin-bottom: 14px;
    }

    .stat-pill {
      width: 100%;
      padding: 12px;
      border-radius: var(--radius);
      background: #fff;
      border: 1px solid var(--line);
      color: var(--ink);
      text-align: left;
      cursor: pointer;
    }

    .stat-pill:hover {
      border-color: var(--stat, var(--blue));
      box-shadow: 0 10px 24px rgba(23, 32, 51, .08);
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
    }

    .home-section {
      margin-bottom: 14px;
    }

    .mini-process {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 6px;
    }

    .mini-stage {
      min-height: 78px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: #fff;
      padding: 9px 7px;
      text-align: center;
    }

    .mini-stage-dot {
      width: 9px;
      height: 9px;
      display: block;
      border-radius: 50%;
      background: var(--dot);
      margin: 0 auto 7px;
    }

    .work-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 12px;
    }

    .work-card {
      min-height: 142px;
      text-align: left;
      border: 2px solid var(--accent, var(--blue));
      border-left: 7px solid var(--accent, var(--blue));
      border-radius: var(--radius);
      background: #fff;
      padding: 16px;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(23, 32, 51, .06);
      transition: transform .16s ease, box-shadow .16s ease, background .16s ease;
    }

    .work-card:hover {
      background: #fff;
      box-shadow: var(--shadow);
      transform: translateY(-2px);
    }

    .work-icon {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: var(--surface-soft);
      color: var(--accent, var(--blue));
      font-weight: 800;
      margin-bottom: 14px;
    }

    .work-title {
      font-size: 16px;
      font-weight: 800;
      margin-bottom: 6px;
    }

    .work-arrow {
      position: absolute;
      right: 14px;
      bottom: 14px;
      color: var(--accent, var(--blue));
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-size: 15px;
      font-weight: 800;
      margin: 0 0 14px;
    }

    .muted { color: var(--muted); }
    .small { font-size: 12px; line-height: 1.45; }
    .empty {
      padding: 22px;
      text-align: center;
      color: var(--muted);
      background: var(--surface-soft);
      border: 1px dashed var(--line-strong);
      border-radius: var(--radius);
    }

    .btn,
    .btn-light,
    .btn-danger,
    .btn-plain,
    .seg-btn {
      border-radius: var(--radius);
      border: 1px solid transparent;
      cursor: pointer;
      white-space: nowrap;
      font-weight: 800;
    }

    .btn {
      background: var(--blue);
      color: #fff;
      padding: 11px 15px;
      box-shadow: 0 8px 18px rgba(31, 110, 179, .16);
    }

    .btn:hover { background: #185f9f; }
    .btn:disabled {
      background: #e3e9f1;
      color: #8997aa;
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-light {
      background: var(--surface);
      color: var(--ink);
      border-color: var(--line);
      padding: 10px 13px;
    }

    .btn-light:hover { border-color: var(--blue); color: var(--blue); }
    .btn-danger {
      background: #fff3f4;
      color: var(--red);
      border-color: #f2b8be;
      padding: 9px 12px;
    }

    .btn-plain {
      background: transparent;
      color: var(--blue);
      padding: 8px 9px;
    }

    .btn-icon {
      width: 38px;
      height: 38px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .segmented {
      display: inline-flex;
      gap: 3px;
      padding: 3px;
      background: #e7edf5;
      border-radius: var(--radius);
      flex-wrap: wrap;
    }

    .seg-btn {
      padding: 8px 10px;
      background: transparent;
      color: var(--muted);
      font-size: 12px;
    }

    .seg-btn.active {
      background: #fff;
      color: var(--blue);
      box-shadow: 0 1px 4px rgba(23, 32, 51, .08);
    }

    .toggle {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--muted);
      cursor: pointer;
      font-weight: 800;
      font-size: 12px;
    }

    .toggle-track {
      width: 38px;
      height: 21px;
      border-radius: 999px;
      background: #c7d2df;
      position: relative;
      transition: background .18s;
    }

    .toggle-track::after {
      content: "";
      position: absolute;
      width: 17px;
      height: 17px;
      left: 2px;
      top: 2px;
      border-radius: 50%;
      background: #fff;
      transition: transform .18s;
      box-shadow: 0 1px 3px rgba(23, 32, 51, .2);
    }

    .toggle.active {
      color: var(--blue);
      border-color: #b9d4f0;
      background: #eef6ff;
    }

    .toggle.active .toggle-track { background: var(--blue); }
    .toggle.active .toggle-track::after { transform: translateX(17px); }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    label,
    .field-label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
    }

    .input,
    .select,
    .textarea {
      width: 100%;
      border: 1px solid var(--line-strong);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 11px 12px;
      min-height: 42px;
      outline: none;
    }

    .textarea {
      min-height: 86px;
      resize: vertical;
      line-height: 1.45;
    }

    .input:focus,
    .select:focus,
    .textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 110, 179, .12);
    }

    .form-row {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }

    .list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .item-row {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
    }

    .item-main { flex: 1; min-width: 0; }
    .item-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .item-actions.manage-actions {
      justify-content: flex-end;
      margin-left: auto;
    }

    .section-card-info {
      min-width: 0;
      flex: 1 1 auto;
    }

    .section-card-name,
    .item-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .section-card-head .item-actions.manage-actions {
      width: auto;
      flex: 0 0 auto;
      align-self: flex-start;
    }

    .manage-item-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      grid-template-rows: 1fr auto;
      min-height: 166px;
      align-items: start;
    }

    .manage-item-row .item-main {
      grid-column: 1;
      grid-row: 1;
      padding-right: 10px;
    }

    .manage-item-row .badge {
      grid-column: 2;
      grid-row: 1;
      justify-self: end;
      align-self: start;
    }

    .manage-item-row .item-actions.manage-actions {
      grid-column: 1 / -1;
      grid-row: 2;
      align-self: end;
      justify-self: stretch;
      width: 100%;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .risk-high { color: var(--red); background: #fff1f2; border-color: #f0b9bf; }
    .risk-medium { color: var(--amber); background: #fff8e8; border-color: #f0d19b; }
    .risk-low { color: var(--green); background: #edf8f1; border-color: #aed8be; }
    .status-done { color: var(--green); background: #edf8f1; border-color: #aed8be; }
    .status-block { color: var(--red); background: #fff1f2; border-color: #f0b9bf; }
    .status-draft { color: var(--blue); background: #eef6ff; border-color: #b9d4f0; }

    .progress {
      height: 8px;
      background: #e8eef6;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      width: var(--pct, 0%);
      background: var(--bar, var(--blue));
      border-radius: inherit;
    }

    .process-board {
      margin-bottom: 14px;
    }

    .ship-board-note {
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .process-chart {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 240px;
      gap: 16px;
      align-items: start;
    }

    .process-stack {
      display: flex;
      height: 18px;
      border-radius: 999px;
      overflow: hidden;
      background: #e8eef6;
      margin-bottom: 16px;
      border: 1px solid var(--line);
    }

    .process-stack span {
      width: var(--share);
      background: var(--bar);
      min-width: var(--min, 0);
    }

    .process-row {
      display: grid;
      grid-template-columns: 86px minmax(0, 1fr) 42px;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
    }

    .process-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 13px;
      font-weight: 800;
    }

    .process-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--dot);
      flex: 0 0 auto;
    }

    .process-bar {
      height: 12px;
      background: #edf2f8;
      border-radius: 999px;
      overflow: hidden;
    }

    .process-bar span {
      display: block;
      width: var(--share);
      height: 100%;
      background: var(--bar);
      border-radius: inherit;
    }

    .process-count {
      text-align: right;
      font-weight: 800;
      color: var(--ink);
      font-size: 13px;
    }

    .process-lanes {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 8px;
    }

    .process-lane {
      min-height: 156px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
      padding: 10px;
    }

    .process-lane-head {

      gap: 6px;
      align-items: center;
      margin-bottom: 8px;
      font-size: 12px;
      font-weight: 800;
    }

    .ship-chip {

      width: 100%;
      text-align: left;
      border: 1px solid var(--line);

      margin-bottom: 6px;

    .ship-card {

    .ship-card .item-actions {

    .ship-card-title {

      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 900;
    }

    .ship-card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin: 10px 0 12px;
    }

    .ship-date-grid {

      grid-template-columns: repeat(2, minmax(0, 1fr));

    .ship-date-field {

      gap: 5px;
    }

    .ship-date-field label {

      font-weight: 900;

    }

    .process-summary {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 14px;
    }

    .summary-ring {
      width: 152px;
      height: 152px;

      place-items: center;
    }

    .summary-ring-inner {

      height: 112px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      text-align: center;

    }

    .category-grid {

      grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
      gap: 12px;
    }

    .category-card {
      text-align: left;
      min-height: 132px;
      background: #fff;

    }

    .category-card:hover {

    }

    .category-icon {
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;

      margin-bottom: 12px;
      font-weight: 800;
    }

    .category-icon svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .pictogram-picker {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(112px, 1fr));
      gap: 8px;
      max-height: 330px;
      overflow: auto;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface-soft);
    }

    .pictogram-btn {
      min-height: 86px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 8px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
      text-align: center;
    }

    .pictogram-btn:hover,
    .pictogram-btn.active {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 110, 179, .12);
      color: var(--blue);
    }

    .pictogram-btn svg {
      width: 28px;
      height: 28px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .pictogram-current {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      margin-bottom: 10px;
    }

    .pictogram-current .category-icon {
      margin-bottom: 0;
      color: var(--accent, var(--blue));
    }

    .check-section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      overflow: hidden;
    }

    .check-section + .check-section { margin-top: 10px; }
    .check-section-head {
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-soft);
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }

    .check-item {
      display: grid;
      grid-template-columns: 22px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 13px 14px;
      border-bottom: 1px solid var(--line);
    }

    .check-item:last-child { border-bottom: 0; }
    .check-item input {
      width: 18px;
      height: 18px;
      margin: 1px 0 0;
      accent-color: var(--blue);
    }

    .check-item.checked .check-text {
      color: var(--soft);
      text-decoration: line-through;
    }

    .notice {
      padding: 13px 14px;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: var(--surface-soft);
      color: var(--muted);
      line-height: 1.45;
    }

    .notice.danger {
      background: #fff4f5;
      border-color: #efb5bd;
      color: var(--red);
    }

    .notice.good {
      background: #effaf3;
      border-color: #b7ddc4;
      color: var(--green);
    }

    .table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    .table th,
    .table td {
      border-bottom: 1px solid var(--line);
      padding: 11px 8px;
      text-align: left;
      vertical-align: top;
    }

    .table th {
      color: var(--muted);
      font-size: 12px;
      background: var(--surface-soft);
    }

    .history-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .history-card {
      position: relative;
      min-width: 0;
      min-height: 148px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: var(--radius);
      background: var(--accent, var(--blue));
      background-image: linear-gradient(135deg, rgba(255,255,255,.08), rgba(0,0,0,.18));
      color: #fff;
      box-shadow: 0 14px 30px rgba(23, 32, 51, .13);
      overflow: hidden;
    }

    .history-card[data-history-detail-card] {
      cursor: pointer;
    }

    .history-card[data-history-detail-card]:focus-visible {
      outline: 3px solid rgba(31, 110, 179, .28);
      outline-offset: 3px;
    }

    .history-card::after {
      content: "";
      position: absolute;
      right: -32px;
      top: -38px;
      width: 118px;
      height: 118px;
      border-radius: 50%;
      border: 24px solid rgba(255,255,255,.08);
      pointer-events: none;
    }

    .history-card-main {
      position: relative;
      z-index: 1;
      min-height: 148px;
      display: flex;
      flex-direction: column;
      padding: 20px 58px 18px 18px;
    }

    .history-card-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    .history-card-title {
      min-width: 0;
      margin-top: auto;
      font-size: 20px;
      font-weight: 800;
      line-height: 1.2;
    }

    .history-card-actions {
      position: absolute;
      right: 14px;
      bottom: 14px;
      display: flex;
      align-items: center;
      gap: 6px;
      flex: 0 0 auto;
    }

    .history-card-icon {
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9px;
      background: rgba(255,255,255,.16);
      color: #fff;
    }

    .history-card-icon svg {
      width: 26px;
      height: 26px;
      stroke: currentColor;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }

    .history-card-summary {
      margin-top: 6px;
      color: rgba(255,255,255,.86);
      font-size: 13px;
      line-height: 1.45;
    }

    .history-card-progress {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      margin-top: 10px;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(255,255,255,.14);
      color: rgba(255,255,255,.94);
      font-size: 12px;
      font-weight: 800;
    }

    .history-detail-btn {
      width: 26px;
      height: 26px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 0;
      border-radius: 50%;
      background: #fff;
      color: var(--accent, var(--blue));
      font-size: 20px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(23, 32, 51, .16);
    }

    .history-card-check {
      width: 18px;
      height: 18px;
      accent-color: #fff;
    }

    .history-detail-wrap {
      position: relative;
      z-index: 1;
      padding: 0 14px 14px;
    }

    .history-detail {
      padding: 14px;
      border: 1px solid #d7e6f6;
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
    }

    .history-detail-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 12px;
    }

    .history-detail-title {
      font-weight: 800;
      margin-bottom: 4px;
      color: var(--ink);
    }

    .history-detail-grid {
      display: grid;
      gap: 10px;
    }

    .history-detail-section {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
      background: #fff;
    }

    .history-detail-section-title {
      padding: 10px 12px;
      background: var(--surface-soft);
      border-bottom: 1px solid var(--line);
      font-weight: 800;
      font-size: 13px;
      color: var(--ink);
    }

    .history-detail-item {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto;
      gap: 10px;
      align-items: start;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      color: var(--ink);
    }

    .history-detail-item:last-child { border-bottom: 0; }

    .history-check-mark {
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      font-size: 12px;
      font-weight: 800;
      background: #edf8f1;
      color: var(--green);
      border: 1px solid #aed8be;
    }

    .history-check-mark.missing {
      background: #fff1f2;
      color: var(--red);
      border-color: #f0b9bf;
    }

    @media (max-width: 920px) {
      .ship-card {
        grid-template-columns: 1fr;
      }

      .ship-date-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .history-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

    .section-card {
      border: 1px solid var(--line);
      border-radius: var(--radius);

    }

    .section-card-head {
      display: flex;
      justify-content: space-between;

    .section-card-body { padding: 12px; }
    .inline-form {

    .color-dot {

      color: #fff;
      box-shadow: var(--shadow);
      z-index: 40;
      display: none;
    }

    .toast.show { display: block; }

    @media (max-width: 920px) {
      .app { display: block; }
      .sidebar { display: none; }
      .view-switch { display: none; }
      .mobile-header {
        display: block;
        padding: 16px 14px 12px;
        background: #111a2d;
        color: #fff;
      }

      .mobile-header .brand { padding: 0; margin: 0; border: 0; }
      .main {
        padding: 16px 12px 92px;

      .page-head {
        flex-direction: column;
        gap: 12px;
      }

      .toolbar { justify-content: flex-start; width: 100%; }
      .grid-3,
      .grid-2,
      .quick-actions,
      .stat-strip,
      .work-grid,
      .split,
      .process-chart,
      .form-row,
      .inline-form {
        grid-template-columns: 1fr;
      }

      .mini-process {
        grid-template-columns: repeat(5, minmax(54px, 1fr));
        overflow-x: auto;
      }

      .process-lanes {
        grid-template-columns: 1fr;
      }

      .band {
        margin: 14px -12px;

      }

      .table,
      .table tbody,
      .table tr,
      .table td {
        display: block;
        width: 100%;
      }

      .table thead { display: none; }
      .table tr {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        background: #fff;
        margin-bottom: 10px;
        overflow: hidden;
      }

      .table td {
        border-bottom: 1px solid var(--line);
        padding: 10px 12px;
      }

      .table td:last-child { border-bottom: 0; }
      .table td::before {
        content: attr(data-label);

        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
        margin-bottom: 4px;
      }

      .bottom-nav {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        padding: 8px 6px calc(8px + env(safe-area-inset-bottom));
        background: rgba(255,255,255,.96);

      .bottom-nav.hide-on-scroll {

      }

      .bottom-nav .nav-btn {
        color: var(--muted);

        gap: 3px;

      .bottom-nav .nav-btn.active {

      }

      .bottom-nav .nav-icon {
        width: 24px;
        height: 24px;
        background: transparent;
      }

      .bottom-nav .nav-icon svg {
        width: 20px;
        height: 20px;
      }

      .item-row {
        flex-direction: column;
      }

      .item-actions {
        width: 100%;
        justify-content: flex-start;
      }
    }

    @media (max-width: 420px) {

      .check-item {

      .bottom-nav { grid-template-columns: repeat(5, 1fr); }
      .process-row {
        grid-template-columns: 76px minmax(0, 1fr) 36px;
      }

    .home-date {

    .home-sub {

    .sync-chip {

    function item(id, categoryId, sectionId, text, risk, order) {
      return { id, categoryId, sectionId, text, risk, required: risk === "high", active: true, order };

    const $ = (id) => document.getElementById(id);
    const esc = (value = "") => String(value).replace(/[&<>"']/g, (char) => ({
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;",
    }[char]));
    const today = () => localDate(serverNow());
    const uid = (prefix) => `${prefix}_${Date.now()}_${Math.random().toString(16).slice(2, 7)}`;
    const pad2 = (value) => String(value).padStart(2, "0");
    const localDate = (date) => `${date.getFullYear()}-${pad2(date.getMonth() + 1)}-${pad2(date.getDate())}`;
    const localTime = (date) => `${pad2(date.getHours())}:${pad2(date.getMinutes())}`;
    const recordTime = (date) => `${pad2(date.getHours())}:${pad2(date.getMinutes())}:${pad2(date.getSeconds())}`;
    const normalizeShipNo = (value) => {
      const raw = value.trim().toUpperCase().replace(/\s+/g, "");
      if (!raw) return "";
      return raw.startsWith("H") ? raw : `H${raw}`;
    };
    const byOrder = (a, b) => (a.order || 0) - (b.order || 0);
    const storeKey = (key) => STORAGE_PREFIX + key;
    const loadJson = (key, fallback) => {
      try {
        const value = localStorage.getItem(storeKey(key));
        return value ? JSON.parse(value) : fallback;
      } catch {
        return fallback;
      }
    };
    const saveJson = (key, value) => localStorage.setItem(storeKey(key), JSON.stringify(value));

    const state = {
      view: "dashboard",
      categories: loadJson("categories", []),
      sections: loadJson("sections", []),
      items: loadJson("items", []),
      ships: loadJson("ships", []),
      inspections: loadJson("inspections", []),
      inspectionItems: loadJson("inspectionItems", []),
      selectedCategoryId: null,
      manageCategoryId: null,
      editSectionId: null,
      editItemId: null,
      draft: { worker: "", shipNo: "", checks: {} },
      historyScope: "all",
      historyFilter: "all",
      historyDetailId: null,
      selectedHistoryIds: [],
      toastTimer: null,
      syncMode: "offline",
      syncText: "로컬 저장",
      screenMode: localStorage.getItem(storeKey("screenMode")) || "desktop",
      adminMode: sessionStorage.getItem("shipyardSafetyAdmin") === "true",

      lastScrollY: 0,
      serverTimeOffsetMs: 0,
      serverClockSyncedAt: "",
    };

    function boot() {
      migrateIfNeeded();
      cleanupDeliveredShips(false);
      applyScreenMode();
      updateHeaderClock();
      render();
      replaceRouteState();
      setupScrollNav();
      setInterval(updateHeaderClock, 1000);
      setInterval(syncServerClock, SERVER_CLOCK_REFRESH_MS);
      window.addEventListener("resize", applyScreenMode);
      window.addEventListener("popstate", restoreRouteState);
      setSyncStatus(isSyncConfigured() ? "동기화 대기" : "로컬 저장", isSyncConfigured() ? "pending" : "offline");
      if (isSyncConfigured()) {
        syncServerClock();
        pullRemote();
      }
    }

    function migrateIfNeeded() {
      if (!state.categories.length || !state.sections.length || !state.items.length) {
        const oldChecklists = readOldJson(OLD_KEYS.checklists, null);
        if (oldChecklists && typeof oldChecklists === "object") {
          migrateOldChecklists(oldChecklists);
        } else {
          state.categories = structuredClone(starterCategories);
          state.sections = structuredClone(starterSections);
          state.items = structuredClone(starterItems);
        }
      }

      if (!state.ships.length) {
        const oldShips = readOldJson(OLD_KEYS.ships, null);
        if (Array.isArray(oldShips)) {
          state.ships = oldShips.map((ship, index) => ({
            id: ship.id || uid("ship"),
            no: normalizeShipNo(ship.no || ship.shipNo || ""),
            type: ship.type || ship.name || "",
            note: ship.note || "",
            processStage: ship.processStage || "registered",
            deliveryType: ship.deliveryType || "",
            deliveryDate: ship.deliveryDate || "",
            lcDate: ship.lcDate || "",
            stDate: ship.stDate || "",
            clDate: ship.clDate || (ship.deliveryType === "C/L" ? ship.deliveryDate || "" : ""),
            dlDate: ship.dlDate || (ship.deliveryType === "D/L" ? ship.deliveryDate || "" : ""),
            createdAt: ship.createdAt || serverNow().toISOString(),
            order: index + 1,
          })).filter((ship) => ship.no);
        }
      }

      if (!state.inspections.length) {
        const oldHistory = readOldJson(OLD_KEYS.history, null);
        if (Array.isArray(oldHistory)) {
          state.inspections = oldHistory.map((entry) => ({
            id: entry.id || uid("inspection"),
            categoryId: entry.type,
            worker: entry.worker || "",
            shipNo: entry.shipNo || "",
            date: entry.date || today(),
            time: entry.time || "",
            status: entry.status || "미완료",
            warnings: Number(entry.warnings || 0),
            completion: entry.status === "완료" ? 100 : 0,
            createdAt: entry.createdAt || serverNow().toISOString(),
          }));
        }
      }

      dedupeShips();
      persist();
    }

    function readOldJson(key, fallback) {
      try {
        const value = localStorage.getItem(key);
        return value ? JSON.parse(value) : fallback;
      } catch {
        return fallback;
      }
    }

    function migrateOldChecklists(oldChecklists) {
      state.categories = [];
      state.sections = [];
      state.items = [];
      Object.entries(oldChecklists).forEach(([id, data], index) => {
        const categoryId = id || uid("cat");
        const sectionId = `${categoryId}_default`;
        state.categories.push({
          id: categoryId,
          label: data.label || "작업 유형",
          icon: data.icon || String(index + 1),
          color: data.color || COLORS[index % COLORS.length],
          order: index + 1,
        });
        state.sections.push({
          id: sectionId,
          categoryId,
          title: "기본 점검",
          order: 1,
        });
        (data.items || []).forEach((sourceItem, itemIndex) => {
          state.items.push({
            id: sourceItem.id || uid("item"),
            categoryId,
            sectionId,
            text: sourceItem.text || "",
            risk: sourceItem.risk || "medium",
            required: (sourceItem.risk || "medium") === "high",
            active: true,
            order: itemIndex + 1,
          });
        });
      });
    }

    function dedupeShips() {
      const seen = new Set();
      state.ships = state.ships.filter((ship) => {
        const no = normalizeShipNo(ship.no);
        if (!no || seen.has(no)) return false;
        seen.add(no);
        ship.no = no;
        ship.processStage = ship.processStage || "registered";
        ship.deliveryType = ship.deliveryType || "";
        ship.deliveryDate = ship.deliveryDate || "";
        ship.lcDate = ship.lcDate || "";
        ship.stDate = ship.stDate || "";
        ship.clDate = ship.clDate || (ship.deliveryType === "C/L" ? ship.deliveryDate : "");
        ship.dlDate = ship.dlDate || (ship.deliveryType === "D/L" ? ship.deliveryDate : "");
        return true;
      });
    }

    function persist() {
      saveJson("categories", state.categories);
      saveJson("sections", state.sections);
      saveJson("items", state.items);
      saveJson("ships", state.ships);
      saveJson("inspections", state.inspections);
      saveJson("inspectionItems", state.inspectionItems);
    }

    function routeState() {
      return {
        app: "shipyardSafety",
        view: state.view,
        selectedCategoryId: state.selectedCategoryId,
        historyScope: state.historyScope,
        historyFilter: state.historyFilter,
        historyDetailId: state.historyDetailId,
      };
    }

    function pushRouteState() {
      history.pushState(routeState(), "", location.pathname + location.search);
    }

    function replaceRouteState() {
      history.replaceState(routeState(), "", location.pathname + location.search);
    }

    function restoreRouteState(event) {
      const route = event.state;
      if (!route || route.app !== "shipyardSafety") {
        state.view = "dashboard";
        state.selectedCategoryId = null;
        state.historyDetailId = null;
        render();
        replaceRouteState();
        return;
      }
      state.view = NAV.some((nav) => nav.id === route.view) ? route.view : "dashboard";
      state.selectedCategoryId = route.selectedCategoryId || null;
      state.historyScope = route.historyScope || "all";
      state.historyFilter = route.historyFilter || "all";
      state.historyDetailId = route.historyDetailId || null;
      if (state.view !== "check") state.selectedCategoryId = null;
      if (!["dashboard", "history"].includes(state.view)) state.historyDetailId = null;
      render();
    }

    function changeView(view, options = {}) {
      if (view === "items" && !verifyAdmin()) return;
      const changed = state.view !== view || state.selectedCategoryId || state.historyDetailId;
      state.view = view;
      if (view !== "check") state.selectedCategoryId = null;
      if (!["dashboard", "history"].includes(view)) state.historyDetailId = null;
      render();
      if (changed) {
        options.replace ? replaceRouteState() : pushRouteState();
      }
    }

    function setSyncStatus(text, mode) {
      state.syncText = text;
      state.syncMode = mode;
      [["syncBadge", "syncText"], ["mobileSyncBadge", "mobileSyncText"]].forEach(([badgeId, textId]) => {
        const badge = $(badgeId);
        const label = $(textId);
        if (badge) badge.className = `sync-badge ${mode}`;
        if (label) label.textContent = text;
      });
    }

    function applyScreenMode() {
      const isNarrow = window.matchMedia && window.matchMedia("(max-width: 920px)").matches;
      if (isNarrow) {
        document.body.classList.remove("preview-mobile");
      } else {
        document.body.classList.toggle("preview-mobile", state.screenMode === "mobile");
      }
      updateScreenToggle();
    }

    function updateScreenToggle() {
      const isNarrow = window.matchMedia && window.matchMedia("(max-width: 920px)").matches;
      const effectiveMode = isNarrow ? "mobile" : state.screenMode;
      document.querySelectorAll("[data-screen-mode]").forEach((button) => {
        button.classList.toggle("active", button.dataset.screenMode === effectiveMode);
      });
    }

    function setScreenMode(mode) {
      state.screenMode = mode === "mobile" ? "mobile" : "desktop";
      localStorage.setItem(storeKey("screenMode"), state.screenMode);
      applyScreenMode();
    }

    function toast(message) {
      const node = $("toast");
      clearTimeout(state.toastTimer);
      node.textContent = message;
      node.classList.add("show");
      state.toastTimer = setTimeout(() => node.classList.remove("show"), 2600);
    }

    function setupScrollNav() {
      state.lastScrollY = window.scrollY || 0;
      window.addEventListener("scroll", () => {
        const nav = $("mobileNav");
        if (!nav) return;
        const currentY = window.scrollY || 0;
        if (currentY > state.lastScrollY && currentY > 24) {
          nav.classList.add("hide-on-scroll");
        }
        clearTimeout(state.scrollTimer);
        state.scrollTimer = setTimeout(() => {
          nav.classList.remove("hide-on-scroll");
        }, 180);
        state.lastScrollY = currentY;
      }, { passive: true });
    }

      page.innerHTML = {
        dashboard: renderDashboard,
        check: renderCheck,
        history: renderHistory,
        ships: renderShips,
        items: renderItems,
      }[state.view]();
      setSyncStatus(state.syncText, state.syncMode);

    function renderAppHeader() {
      const titles = {
        dashboard: "홈",
        check: "점검 작성",
        history: "점검 이력",
        ships: "공정 보드",
        items: "항목 관리",
      };
      const title = $("appbarTitle");
      const headline = $("homeHeadline");
      const date = $("homeDateLabel");
      if (title) title.textContent = titles[state.view] || "홈";
      if (headline) headline.style.display = state.view === "dashboard" ? "flex" : "none";
      if (date) date.textContent = formatKoreanDate(serverNow());
      updateHeaderClock();

    function updateHeaderClock() {
      const time = $("phoneTime");
      const date = $("homeDateLabel");
      if (time) time.textContent = localTime(serverNow());
      if (date && state.view === "dashboard") date.textContent = formatKoreanDate(serverNow());
    }

    function formatKoreanDate(date) {
      const days = ["일", "월", "화", "수", "목", "금", "토"];
      return `${date.getFullYear()}.${pad2(date.getMonth() + 1)}.${pad2(date.getDate())} (${days[date.getDay()]})`;
    }

    function serverNow() {
      return new Date(Date.now() + Number(state.serverTimeOffsetMs || 0));
    }

    async function syncServerClock() {
      if (!isSyncConfigured()) return;
      try {
        const response = await fetch(`${SUPABASE_URL}/rest/v1/`, {
          method: "HEAD",
          headers: {
            apikey: SUPABASE_ANON_KEY,
            Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
          },
          cache: "no-store",
        });
        const serverDate = response.headers.get("date");
        if (!serverDate) return;
        const serverMs = new Date(serverDate).getTime();
        if (!Number.isFinite(serverMs)) return;
        state.serverTimeOffsetMs = serverMs - Date.now();
        state.serverClockSyncedAt = new Date().toISOString();
        updateHeaderClock();
      } catch (error) {
        console.warn("Server clock sync failed", error);
      }
    }

    function renderNav() {
      const html = NAV.map((nav) => `
        <button class="nav-btn ${state.view === nav.id ? "active" : ""}" data-view="${nav.id}" type="button">
          <span class="nav-icon">${navIcon(nav.icon)}</span><span>${esc(nav.label)}</span>
        </button>`).join("");
      $("desktopNav").innerHTML = html;
      $("mobileNav").innerHTML = html;
    }

    function navIcon(name) {
      const icons = {
        home: `<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 11.5 12 4l8 7.5"></path><path d="M6.5 10.5V20h11v-9.5"></path><path d="M10 20v-6h4v6"></path></svg>`,

    function renderDashboard() {
      const todayRows = state.inspections.filter((row) => row.date === today());

      const doneCount = state.inspections.filter((row) => row.status === "완료").length;
      const warnCount = state.inspections.reduce((sum, row) => sum + Number(row.warnings || 0), 0);
      const completion = state.inspections.length ? Math.round(doneCount / state.inspections.length * 100) : 0;
      const latest = state.inspections.slice(0, 4);
      const deliverySoon = upcomingDeliveryShips().length;
      const processStages = SHIP_WORKFLOW_STAGES.map((stage) => ({
        stage,
        info: shipStageInfo(stage),
        count: state.ships.filter((ship) => effectiveShipStage(ship).stage === stage).length,

      return `<div class="app-card-shell">

      <div class="stat-strip">

        ${statPill("위험 미확인", warnCount, "건", "#dc2626", "warning", "즉시 확인 필요", "risk")}
        ${statPill("인도 예정", deliverySoon, "척", "#f97316", "clock", "7일 이내", "delivery")}

    function categoryVisual(cat) {
      return workVisual(cat.icon, cat.icon || cat.id || "?");
    }

    function renderPictogramPicker(selected = "", targetId = "catIcon") {
      const activeKey = normalizeIconKey(selected);
      return `<div class="pictogram-picker">
        ${PICTOGRAMS.map((icon) => `<button class="pictogram-btn ${activeKey === icon.key ? "active" : ""}" data-pick-icon="${esc(icon.key)}" data-pick-icon-target="${esc(targetId)}" type="button">
          ${workVisual(icon.key, icon.label)}
          <span>${esc(icon.label)}</span>
        </button>`).join("")}
      </div>`;
    }

    function workAccent(id, fallback) {
      return ({
        welding: "#0b66ff",
        height: "#0f9f6e",
        mounting: "#f97316",
        confined: "#dc2626",
      })[id] || fallback || "#0b66ff";
    }

    function workLabel(cat) {
      return ({
        welding: "용접",
        height: "고소",
        mounting: "탑재",
        confined: "밀폐",
      })[cat.id] || cat.label;
    }

    function renderCheck() {
      if (!state.selectedCategoryId) {
        return `<section class="write-intro">
          <h1>어떤 작업을 점검할까요?</h1>
          <p>작업 유형을 선택하면 점검을 시작합니다.</p>
        </section>
        <div class="work-grid">
          ${state.categories.sort(byOrder).map((cat) => {
            return `<button class="work-card" style="--accent:${esc(workAccent(cat.id, cat.color))}" data-select-category="${cat.id}" type="button">
              <span class="work-icon">${categoryVisual(cat)}</span>
              <div class="work-title">${esc(workLabel(cat))}</div>
              <span class="work-arrow">›</span>
            </button>`;
          }).join("")}
        </div>`;
      }

      const cat = categoryById(state.selectedCategoryId);
      if (!cat) {
        state.selectedCategoryId = null;
        return renderCheck();
      }
      const items = activeItems(cat.id);
      const checked = items.filter((row) => state.draft.checks[row.id]).length;
      const highMissing = items.filter((row) => row.risk === "high" && !state.draft.checks[row.id]);
      const pct = items.length ? Math.round(checked / items.length * 100) : 0;
      const selectableShips = visibleWorkerShips();
      const canSubmit = state.draft.worker.trim() && state.draft.shipNo && items.length && highMissing.length === 0;

      return `${pageHead(cat.label, "섹션별로 점검하고, 고위험 항목은 모두 확인해야 제출됩니다.", `<button class="btn-light" data-action="back-check-types" type="button">뒤로</button>`)}
      <div class="split">
        <div>
          <div class="panel panel-pad" style="margin-bottom:12px">
            <div class="form-row">
              <div class="field">
                <label for="worker">담당자명</label>
                <input class="input" id="worker" value="${esc(state.draft.worker)}" placeholder="이름 입력" />
              </div>
              <div class="field">
                <label for="shipNo">호선 번호</label>
                <select class="select" id="shipNo">
                  <option value="">호선 선택</option>
                  ${selectableShips.map((ship) => `<option value="${esc(ship.no)}" ${state.draft.shipNo === ship.no ? "selected" : ""}>${esc(ship.no)} · ${esc(ship.type || "선종 미지정")}</option>`).join("")}
                </select>
              </div>
              <button class="btn" data-action="submit-inspection" ${canSubmit ? "" : "disabled"} type="button">제출하기</button>
            </div>
          </div>
          ${selectableShips.length ? "" : `<div class="notice danger" style="margin-bottom:12px">작업자에게 공개된 호선이 없습니다. 호선 관리에서 L/C일을 입력한 호선만 점검 목록에 표시됩니다.</div>`}
          ${highMissing.length ? `<div class="notice danger" style="margin-bottom:12px">미확인 위험 항목 ${highMissing.length}건이 있습니다. 위험 항목은 모두 확인해야 제출할 수 있습니다.</div>` : `<div class="notice good" style="margin-bottom:12px">고위험 항목이 모두 확인되었습니다.</div>`}
          ${renderChecklistSections(cat.id)}
        </div>
        <aside class="panel panel-pad">
          <div class="section-title">작성 상태</div>
          ${progress(pct, cat.color)}
          <div class="small muted" style="margin-top:8px">${checked}/${items.length} 항목 확인됨</div>
          <div class="list" style="margin-top:16px">
            ${badge(highMissing.length ? "high" : "low", highMissing.length ? `위험 ${highMissing.length}건 남음` : "위험 확인 완료")}
            ${badge("medium", state.draft.worker.trim() ? "담당자 입력됨" : "담당자 필요")}
            ${badge("medium", state.draft.shipNo ? "호선 선택됨" : "호선 필요")}
          </div>
        </aside>
      </div>`;
    }

    function renderChecklistSections(categoryId) {
      const sections = sectionsFor(categoryId);
      if (!sections.length) return `<div class="empty">등록된 섹션이 없습니다.</div>`;
      return sections.map((section) => {
        const items = activeItems(categoryId).filter((row) => row.sectionId === section.id);
        return `<section class="check-section">
          <div class="check-section-head">
            <span>${esc(section.title)}</span>
            <span class="small muted">${items.filter((row) => state.draft.checks[row.id]).length}/${items.length}</span>
          </div>
          ${items.length ? items.map((row) => `
            <label class="check-item ${state.draft.checks[row.id] ? "checked" : ""}">
              <input type="checkbox" data-check-item="${row.id}" ${state.draft.checks[row.id] ? "checked" : ""} />
              <span class="check-text">${esc(row.text)}</span>
              ${badge(row.risk)}
            </label>`).join("") : `<div class="notice">이 섹션에는 항목이 없습니다.</div>`}
        </section>`;
      }).join("");
    }

    function renderHistory() {
      if (state.historyDetailId) {
        const detailRow = state.inspections.find((row) => row.id === state.historyDetailId);
        if (detailRow) return renderInspectionRecord(detailRow);
        state.historyDetailId = null;
      }
      const scopeButtons = [
        ["all", "전체 이력"],
        ["today", "오늘 점검"],
        ["risk", "위험 미확인"],
        ["delivery", "인도 예정"],
      ];
      const filterButtons = [["all", "전체"], ...state.categories.sort(byOrder).map((cat) => [cat.id, cat.label])];
      const rows = filteredHistoryRows();
      const deliveryRows = upcomingDeliveryShips();
      const selectedCount = state.selectedHistoryIds.filter((id) => rows.some((row) => row.id === id)).length;
      const isDeliveryScope = state.historyScope === "delivery";
      const historyLead = {
        all: "제출된 점검 내역과 위험 경고 건수를 확인합니다.",
        today: "오늘 제출된 점검이 어떤 작업으로 진행되었는지 확인합니다.",
        risk: "위험 항목이 미확인으로 남은 점검만 모아 확인합니다.",
        delivery: "7일 이내 인도 예정인 호선을 확인합니다.",
      }[state.historyScope] || "제출된 점검 내역과 위험 경고 건수를 확인합니다.";

      return `${pageHead("기록", historyLead, `
        <button class="toggle ${state.adminMode ? "active" : ""}" data-action="toggle-admin" type="button" aria-pressed="${state.adminMode ? "true" : "false"}">
          <span class="toggle-track"></span><span>수정 ${state.adminMode ? "ON" : "OFF"}</span>
        </button>
        ${isDeliveryScope ? "" : `<button class="btn-danger" data-action="delete-selected-history" ${state.adminMode && selectedCount ? "" : "disabled"} type="button">선택 삭제 ${selectedCount ? `(${selectedCount})` : ""}</button>`}
        ${isDeliveryScope ? "" : `<button class="btn-danger" data-action="reset-history" type="button">이력 초기화</button>`}
      `)}
      <div class="segmented" style="margin-bottom:12px">
        ${scopeButtons.map(([id, label]) => `<button class="seg-btn ${state.historyScope === id ? "active" : ""}" data-history-scope="${id}" type="button">${esc(label)}</button>`).join("")}
      </div>
      ${isDeliveryScope ? "" : `<div class="segmented" style="margin-bottom:12px">
        ${filterButtons.map(([id, label]) => `<button class="seg-btn ${state.historyFilter === id ? "active" : ""}" data-history-filter="${id}" type="button">${esc(label)}</button>`).join("")}
      </div>`}
      ${isDeliveryScope ? "" : (state.adminMode ? `<div class="notice good" style="margin-bottom:12px">관리자 수정 모드가 켜져 있습니다.</div>` : `<div class="notice" style="margin-bottom:12px">수정과 초기화는 관리자 비밀번호로 수정 모드를 켠 뒤 사용할 수 있습니다.</div>`)}
      <div class="panel panel-pad">
        ${isDeliveryScope
          ? (deliveryRows.length ? renderDeliveryCards(deliveryRows) : `<div class="empty">7일 이내 인도 예정 호선이 없습니다.</div>`)
          : (rows.length ? renderHistoryTable(rows) : `<div class="empty">조건에 맞는 점검 이력이 없습니다.</div>`)}
      </div>`;
    }

    function filteredHistoryRows() {
      let rows = state.inspections;
      if (state.historyScope === "today") rows = rows.filter((row) => row.date === today());
      if (state.historyScope === "risk") rows = rows.filter((row) => Number(row.warnings || 0) > 0);
      if (state.historyFilter !== "all") rows = rows.filter((row) => row.categoryId === state.historyFilter);
      return rows;
    }

    function renderHistoryTable(rows) {
      const canSelect = state.view === "history" && state.adminMode;
      const displayRows = state.view === "dashboard" ? rows.slice(0, 4) : rows;
      return `<div class="history-grid">
        ${displayRows.map((row) => {
          const cat = categoryById(row.categoryId) || { label: "(삭제된 유형)", icon: "?" };
          return `<article class="history-card" style="--accent:${esc(workAccent(cat.id, cat.color))}" data-history-detail-card="${esc(row.id)}" role="button" tabindex="0" aria-label="${esc(cat.label)} 점검 상세내역 보기">
            <div class="history-card-main">
              <div class="history-card-top">
                <span class="history-card-icon">${categoryVisual(cat)}</span>
                <div class="history-card-actions">
                  ${canSelect ? `<input class="history-card-check" type="checkbox" aria-label="이력 선택" data-history-check="${row.id}" ${state.selectedHistoryIds.includes(row.id) ? "checked" : ""}>` : ""}
                  <button class="history-detail-btn" data-history-detail="${row.id}" aria-label="점검 기록 화면 보기" title="점검 기록" type="button">›</button>
                </div>
              </div>
              <div class="history-card-title">${esc(cat.label)}</div>
              <div class="history-card-summary">${esc(row.worker || "-")} · ${esc(row.shipNo || "-")} · ${esc(shortHistoryDate(row))}</div>
              <div class="history-card-progress">완료율 ${esc(row.completion)}%</div>
            </div>
          </article>`;
        }).join("")}
      </div>`;
    }

    function shortHistoryDate(row) {
      const date = row.date ? row.date.replace(/^\d{4}-/, "").replace("-", ".") : "-";
      return `${date}${row.time ? ` ${row.time}` : ""}`;
    }

    function renderDeliveryCards(rows) {
      const displayRows = rows.slice(0, 4);
      return `<div class="history-grid">
        ${displayRows.map((ship) => {
          const info = effectiveShipStage(ship);
          return `<article class="history-card" style="--accent:#f97316">
            <div class="history-card-main">
              <div class="history-card-top">
                <span class="history-card-icon">${navIcon("ship")}</span>
                <div class="history-card-actions">
                  <button class="history-detail-btn" data-view="ships" aria-label="호선 관리로 이동" title="호선 관리" type="button">›</button>
                </div>
              </div>
              <div class="history-card-title">${esc(ship.no)}</div>
              <div class="history-card-summary">${esc(ship.type || "선종 미지정")} · ${esc(info.label)} · ${esc(shortDate(shipDeliveryDate(ship)))}</div>
              <div class="history-card-progress">${esc(deliveryDueText(shipDeliveryDate(ship)))}</div>
            </div>
          </article>`;
        }).join("")}
      </div>`;
    }

    function shortDate(value) {
      return value ? dateOnly(value).replace(/^\d{4}-/, "").replace("-", ".") : "-";
    }

    function deliveryDueText(value) {
      const diff = daysUntil(value);
      if (diff === 0) return "오늘 인도 예정";
      if (diff > 0) return `D-${diff}`;
      return `D+${Math.abs(diff)}`;
    }

    function renderHistoryDetail(row, cat) {
      const items = state.inspectionItems.filter((item) => item.inspectionId === row.id);
      if (!items.length) {
        return `<div class="history-detail">
          <div class="history-detail-title">상세내역 없음</div>
          <div class="small muted">이 기록에는 제출 당시 항목별 체크 내역이 저장되어 있지 않습니다.</div>
        </div>`;
      }
      const grouped = items.reduce((acc, item) => {
        const key = item.sectionTitle || "기본 점검";
        if (!acc[key]) acc[key] = [];
        acc[key].push(item);
        return acc;
      }, {});
      const checkedCount = items.filter((item) => item.checked).length;
      return `<div class="history-detail">
        <div class="history-detail-head">
          <div>
            <div class="history-detail-title">${esc(cat.label)} 상세내역</div>
            <div class="small muted">${esc(row.shipNo)} · ${esc(row.worker)} · ${esc(row.date)} ${esc(row.time)}</div>
          </div>
          <div>${badge(row.warnings ? "high" : "low", `${checkedCount}/${items.length} 확인`)}</div>
        </div>
        <div class="history-detail-grid">
          ${Object.entries(grouped).map(([sectionTitle, sectionItems]) => `
            <section class="history-detail-section">
              <div class="history-detail-section-title">${esc(sectionTitle)}</div>
              ${sectionItems.map((item) => `
                <div class="history-detail-item">
                  <span class="history-check-mark ${item.checked ? "" : "missing"}">${item.checked ? "✓" : "!"}</span>
                  <span>${esc(item.text)}</span>
                  ${badge(item.risk)}
                </div>
              `).join("")}
            </section>
          `).join("")}
        </div>
      </div>`;
    }

    function renderInspectionRecord(row) {
      const cat = categoryById(row.categoryId) || { id: row.categoryId || "deleted", label: "(삭제된 유형)", icon: "?", color: "#607084" };
      const items = state.inspectionItems.filter((item) => item.inspectionId === row.id);
      const checkedCount = items.filter((item) => item.checked).length;
      const pct = Number(row.completion || (items.length ? Math.round(checkedCount / items.length * 100) : 0));
      const accent = workAccent(cat.id, cat.color);
      return `${pageHead(`${cat.label} 점검 기록`, "제출 당시 점검 화면을 읽기 전용으로 확인합니다.", `<button class="btn-light" data-action="back-history-list" type="button">목록으로</button>`)}
      <div class="split">
        <div>
          <div class="panel panel-pad" style="margin-bottom:12px">
            <div class="form-row">
              <div class="field">
                <label>담당자명</label>
                <input class="input" value="${esc(row.worker || "-")}" readonly />
              </div>
              <div class="field">
                <label>호선 번호</label>
                <input class="input" value="${esc(row.shipNo || "-")}" readonly />
              </div>
              <div class="field">
                <label>점검 일시</label>
                <input class="input" value="${esc(`${row.date || "-"} ${row.time || ""}`.trim())}" readonly />
              </div>
            </div>
          </div>
          ${items.length ? renderInspectionRecordSections(items) : `<div class="empty">이 기록에는 제출 당시 항목별 체크 내역이 저장되어 있지 않습니다.</div>`}
        </div>
        <aside class="panel panel-pad">
          <div class="section-title">점검 결과</div>
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
            <span class="work-icon" style="--accent:${esc(accent)};margin:0;flex:0 0 auto">${categoryVisual(cat)}</span>
            <div>
              <div style="font-size:18px;font-weight:900;color:#0f2440">${esc(cat.label)}</div>
              <div class="small muted">${esc(row.shipNo || "-")} · ${esc(row.worker || "-")}</div>
            </div>
          </div>
          ${progress(pct, accent)}
          <div class="small muted" style="margin-top:8px">${checkedCount}/${items.length} 항목 확인됨</div>
          <div class="list" style="margin-top:16px">
            ${statusBadge(row.status || "완료")}
            ${badge(Number(row.warnings || 0) ? "high" : "low", Number(row.warnings || 0) ? `위험 ${row.warnings}건 미확인` : "위험 확인 완료")}
            ${badge("medium", `완료율 ${pct}%`)}
          </div>
        </aside>
      </div>`;
    }

    function renderInspectionRecordSections(items) {
      const grouped = items.reduce((acc, item) => {
        const key = item.sectionTitle || "기본 점검";
        if (!acc[key]) acc[key] = [];
        acc[key].push(item);
        return acc;
      }, {});
      return Object.entries(grouped).map(([sectionTitle, sectionItems]) => `
        <section class="check-section">
          <div class="check-section-head">
            <span>${esc(sectionTitle)}</span>
            <span class="small muted">${sectionItems.filter((item) => item.checked).length}/${sectionItems.length}</span>
          </div>
          ${sectionItems.map((item) => `
            <label class="check-item ${item.checked ? "checked" : ""}">
              <input type="checkbox" ${item.checked ? "checked" : ""} disabled />
              <span class="check-text">${esc(item.text)}</span>
              ${badge(item.risk)}
            </label>
          `).join("")}
        </section>
      `).join("");
    }

    function renderShips() {
      const grouped = SHIP_WORKFLOW_STAGES.map((stage) => ({
        stage,
        ships: state.ships.filter((ship) => effectiveShipStage(ship).stage === stage),
      }));
      return `${renderProcessBoard(grouped)}
      <div class="panel panel-pad" style="margin-bottom:14px">
        <div class="section-title">
          <span>호선 일괄 추가</span>
          <button class="toggle ${state.adminMode ? "active" : ""}" data-action="toggle-admin" type="button" aria-pressed="${state.adminMode ? "true" : "false"}">
            <span class="toggle-track"></span><span>수정 ${state.adminMode ? "ON" : "OFF"}</span>
          </button>
        </div>
        ${state.adminMode ? "" : `<div class="notice" style="margin-bottom:12px">호선 추가/삭제는 수정 모드를 ON으로 전환한 뒤 가능합니다.</div>`}
        <div class="grid-2">
          <div class="field">
            <label for="newShipNos">호선 번호</label>
            <textarea class="textarea" id="newShipNos" placeholder="한 줄에 하나씩 입력&#10;예) 1234&#10;H1235&#10;1236 LNG"></textarea>
          </div>
          <div class="list">
            <div class="field">
              <label for="newShipType">기본 선종</label>
              <select class="select" id="newShipType">${shipTypeOptions("")}</select>
            </div>
            <div class="field">
              <label for="newShipCustom">기타 선종</label>
              <input class="input" id="newShipCustom" placeholder="기타 선택 시 입력" />
            </div>
            <button class="btn" data-action="add-ship" ${state.adminMode ? "" : "disabled"} type="button">일괄 추가</button>
          </div>
        </div>
      </div>
      <div class="panel panel-pad">
        <div class="section-title">호선 정보 카드 <span class="small muted">${state.ships.length}척</span></div>
        <div class="ship-board-note">L/C일이 입력된 호선만 작업자 점검 화면에 표시됩니다. 탑재 점검 기록이 3건 이상이면 L/C 단계로 자동 판정됩니다.</div>
        ${state.ships.length ? `<div class="list">${state.ships.map(renderShipRow).join("")}</div>` : `<div class="empty">등록된 호선이 없습니다.</div>`}
      </div>`;
    }

    function renderProcessBoard(grouped) {
      const total = state.ships.length;
      const stages = grouped.map(({ stage, ships }) => ({ info: shipStageInfo(stage), ships }));
      return `<div class="panel panel-pad process-board">
        <div class="section-title">호선 공정 자동 분류 <span class="small muted">총 ${total}척</span></div>
        <div class="ship-board-note">탑재 완료: 탑재 점검 기록 3건 이상 · L/C일 경과: S/T 이동 · S/T일 + 7일: C/L 또는 D/L 인도 관리 · 인도일 + 1개월: 자동 삭제</div>
        <div class="process-tabs">
          ${stages.map(({ info }) => `<div class="stage-tab" style="--stage:${esc(info.color)}">${esc(info.label)}</div>`).join("")}
        </div>
        <div class="process-lanes">
          ${stages.map(({ info, ships }) => {
            return `<div class="process-lane">
              <div class="process-lane-head"><span>${esc(info.label)}</span><span>${ships.length}</span></div>
              ${ships.slice(0, 5).map((ship) => `<span class="ship-chip" style="--chip:${esc(info.color)}">${navIcon("ship")}<strong>${esc(ship.no)}</strong><small>${esc(shipStageCardFoot(ship))}</small></span>`).join("")}
              ${ships.length > 5 ? `<span class="ship-tile" style="--chip:${esc(info.color)}">+${ships.length - 5}</span>` : `<button class="ship-tile add-ship-tile" style="--chip:${esc(info.color)}" data-action="focus-ship-add" type="button">+<small>호선 추가</small></button>`}
            </div>`;
          }).join("")}
        </div>
        <div class="process-legend">
          <span><i class="legend-dot" style="--dot:#607084"></i>탑재 3건</span>
          <span><i class="legend-dot" style="--dot:#1f6eb3"></i>L/C일</span>
          <span><i class="legend-dot" style="--dot:#168a94"></i>S/T일+7</span>
          <span><i class="legend-dot" style="--dot:#f59e0b"></i>인도+1개월 삭제</span>
        </div>
      </div>`;
    }

    function renderShipRow(ship) {
      const info = effectiveShipStage(ship);
      const mountingCount = mountingInspectionCount(ship);
      const deliveryType = shipDeliveryType(ship) || "인도";
      const deliveryDate = shipDeliveryDate(ship);
      return `<div class="item-row ship-card" style="--stage:${esc(info.color)}">
        <div class="item-main">
          <div class="ship-card-title">
            <span>${navIcon("ship")}</span>
            <span>${esc(ship.no)}</span>
            <span class="small muted">${esc(ship.type || "선종 미지정")}</span>
          </div>
          <div class="ship-card-meta">
            ${badge("medium", `현재 ${info.label}`)}
            ${badge(mountingCount >= 3 ? "low" : "medium", `탑재 ${mountingCount}/3건`)}
            ${badge(isWorkerVisibleShip(ship) ? "low" : "medium", isWorkerVisibleShip(ship) ? "작업자 공개" : "L/C일 입력 전 비공개")}
            ${deliveryDate ? badge("medium", `${deliveryType} ${shortDate(deliveryDate)}`) : ""}
          </div>
          ${progress(info.percent, info.color)}
        </div>
        <div class="item-actions">
          <div class="ship-date-grid">
            ${shipDateField(ship, "lcDate", "L/C")}
            ${shipDateField(ship, "stDate", "S/T")}
            ${shipDateField(ship, "clDate", "C/L")}
            ${shipDateField(ship, "dlDate", "D/L")}
          </div>
          <button class="btn-danger" data-delete-ship="${ship.id}" ${state.adminMode ? "" : "disabled"} type="button">삭제</button>
        </div>
      </div>`;
    }

    function shipDateField(ship, field, label) {
      return `<div class="ship-date-field">
        <label for="${field}_${ship.id}">${label} DATE</label>
        <input class="input" id="${field}_${ship.id}" type="date" data-ship-date-field="${field}" data-ship-id="${ship.id}" value="${esc(ship[field] || "")}" ${state.adminMode ? "" : "disabled"} />
      </div>`;
    }

    function shipStageCardFoot(ship) {
      const info = effectiveShipStage(ship);
      if (info.stage === "mounting") return `탑재 ${mountingInspectionCount(ship)}/3`;
      if (info.stage === "lc") return ship.lcDate ? `L/C ${shortDate(ship.lcDate)}` : "탑재 완료";
      if (info.stage === "st") return ship.stDate ? `S/T ${shortDate(ship.stDate)}` : "L/C 경과";
      if (info.stage === "cl") return ship.clDate ? `C/L ${shortDate(ship.clDate)}` : "S/T+7";
      if (info.stage === "dl") return ship.dlDate ? `D/L ${shortDate(ship.dlDate)}` : "S/T+7";
      return "";
    }

    function renderItems() {
      if (!state.manageCategoryId) {
        return `${pageHead("항목 관리", "작업 유형을 만들고, 유형 안에 섹션을 나눈 뒤 점검 항목을 추가합니다.")}
        <div class="panel panel-pad" style="margin-bottom:14px">
          <div class="section-title">작업 유형 추가</div>
          ${state.adminMode ? "" : `<div class="notice" style="margin-bottom:12px">항목 수정은 이력 화면에서 수정 모드를 ON으로 전환한 뒤 가능합니다.</div>`}
          <div class="form-row">
            <div class="field">
              <label for="catLabel">작업 유형명</label>
              <input class="input" id="catLabel" placeholder="예) 도장 작업" />
            </div>
            <div class="field">
              <label for="catIcon">아이콘/픽토그램</label>
              <input class="input" id="catIcon" placeholder="예) erection 또는 P" />
            </div>
            <div class="field">
              <span class="field-label">색상</span>
              <div class="color-row">${COLORS.map((color, index) => `<button class="color-dot ${index === 0 ? "active" : ""}" style="--dot:${color}" data-pick-color="${color}" type="button" aria-label="색상 선택"></button>`).join("")}</div>
              <input type="hidden" id="catColor" value="${COLORS[0]}" />
            </div>
            <button class="btn" data-action="add-category" ${state.adminMode ? "" : "disabled"} type="button">추가</button>
          </div>
          ${renderPictogramPicker("erection")}
        </div>
        <div class="category-grid">
          ${state.categories.sort(byOrder).map((cat) => `
            <div class="category-card" style="--accent:${esc(cat.color)}">
              <span class="category-icon">${categoryVisual(cat)}</span>
              <div class="item-name" style="font-weight:800" title="${esc(cat.label)}">${esc(cat.label)}</div>
              <div class="small muted" style="margin:6px 0 12px">${sectionsFor(cat.id).length}개 섹션 · ${activeItems(cat.id).length}개 항목</div>
              <div class="item-actions manage-actions">
                <button class="btn-light" data-manage-category="${cat.id}" type="button">섹션/항목 관리</button>
                <button class="btn-danger" data-delete-category="${cat.id}" ${state.adminMode ? "" : "disabled"} type="button">삭제</button>
              </div>
            </div>`).join("")}
        </div>`;
      }

      const cat = categoryById(state.manageCategoryId);
      if (!cat) {
        state.manageCategoryId = null;
        return renderItems();
      }
      return `${pageHead(`${cat.label} 항목 관리`, "섹션별로 항목을 나누어 현장 점검 화면에 같은 구조로 표시합니다.", `<button class="btn-light" data-action="back-items" type="button">목록으로</button>`)}
      <div class="split">
        <div class="panel panel-pad">
          <div class="section-title">섹션 추가</div>
          <div class="form-row">
            <div class="field">
              <label for="newSectionTitle">섹션명</label>
              <input class="input" id="newSectionTitle" placeholder="예) 작업 전 준비" />
            </div>
